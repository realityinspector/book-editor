<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Book Editor{% endblock %}</title>
    <style>
        :root {
            --bg: #fafaf8;
            --text: #1d1d1f;
            --secondary: #6e6e73;
            --border: #e5e5ea;
            --surface: #fff;
            --accent: #007aff;
            --w: 640px;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 17px; }
        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── Nav ── */
        nav {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            font-size: 0.72rem;
            color: var(--secondary);
            padding: 1.25rem 1.5rem 0;
            max-width: var(--w);
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.01em;
        }
        nav a { color: var(--secondary); }
        nav a:hover { color: var(--text); text-decoration: none; }
        .crumb { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; }
        .crumb .sep { opacity: 0.35; }

        /* ── Main ── */
        main {
            max-width: var(--w);
            margin: 0 auto;
            padding: 2rem 1.5rem 5rem;
        }
        h1 { font-size: 1.6rem; font-weight: 400; line-height: 1.3; margin-bottom: 0.3rem; }
        .meta {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            font-size: 0.78rem;
            color: var(--secondary);
            line-height: 1.5;
        }
        .section-label {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            font-size: 0.67rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--secondary);
            margin: 3rem 0 0.8rem;
        }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 0.5rem;
            transition: border-color 0.15s;
        }
        .card:hover { border-color: #c7c7cc; }
        .card h3 {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.15rem;
        }
        .card p {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            font-size: 0.78rem;
            color: var(--secondary);
        }
        .card-link { display: block; text-decoration: none !important; color: inherit !important; }
        .tag {
            display: inline-block;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            font-size: 0.6rem;
            font-weight: 600;
            padding: 0.12rem 0.45rem;
            border-radius: 3px;
            background: #e8e8ed;
            color: var(--secondary);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            vertical-align: middle;
        }
        .tag.complete { background: #d1f2d1; color: #1a7a1a; }
        .tag.running, .tag.micro, .tag.full { background: #fff3cd; color: #856404; }
        .tag.failed { background: #f8d7da; color: #721c24; }
        hr.divider { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }

        /* ── Prose (rendered markdown) ── */
        .prose h1 { font-size: 1.4rem; margin: 2.5rem 0 0.75rem; font-weight: 600; }
        .prose h2 { font-size: 1.15rem; margin: 2rem 0 0.6rem; font-weight: 600; }
        .prose h3 { font-size: 1rem; margin: 1.5rem 0 0.5rem; font-weight: 600; }
        .prose p { margin-bottom: 1rem; }
        .prose blockquote {
            border-left: 2px solid var(--border);
            padding-left: 1.25rem;
            margin: 1.5rem 0;
            color: var(--secondary);
            font-style: italic;
        }
        .prose hr {
            border: none;
            text-align: center;
            margin: 3rem 0;
            line-height: 1;
        }
        .prose hr::after {
            content: '\b7\a0\a0\b7\a0\a0\b7';
            color: var(--secondary);
            font-size: 1.2rem;
        }
        .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 1rem; }
        .prose li { margin-bottom: 0.25rem; }
        .prose strong { font-weight: 700; }
        .prose em { font-style: italic; }
        .prose img { max-width: 100%; }

        /* ── Feedback ── */
        .fb-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 0.75rem;
        }
        .fb-header {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .fb-header h4 { font-size: 0.85rem; font-weight: 600; }
        .fb-header .score { font-size: 0.9rem; font-weight: 700; }
        .fb-persona {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            font-size: 0.75rem;
            color: var(--secondary);
            font-style: italic;
            margin-bottom: 0.75rem;
        }
        .fb-section h5 {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--secondary);
            margin: 0.75rem 0 0.35rem;
            font-weight: 600;
        }
        .fb-section li {
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            line-height: 1.5;
        }

        /* ── Log ── */
        .log-entry {
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }
        .log-meta {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            font-size: 0.72rem;
            color: var(--secondary);
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.25rem;
        }
        .log-content {
            font-size: 0.83rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 5rem;
            overflow: hidden;
            position: relative;
        }
        .log-content.expanded { max-height: none; }
        .expand-btn {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            font-size: 0.72rem;
            color: var(--accent);
            cursor: pointer;
            margin-top: 0.2rem;
            border: none;
            background: none;
            padding: 0;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            html { font-size: 16px; }
            nav, main { padding-left: 1rem; padding-right: 1rem; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    {% block nav_block %}
    <nav>
        <div class="crumb">
            <a href="/browse">Library</a>
            {% block crumb %}{% endblock %}
        </div>
        <a href="/logout">Exit</a>
    </nav>
    {% endblock %}
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
