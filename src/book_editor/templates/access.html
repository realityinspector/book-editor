<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access — Book Editor</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background: #fafaf8;
            color: #1d1d1f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .gate {
            text-align: center;
            width: 100%;
            max-width: 300px;
            padding: 0 1.5rem;
        }
        .gate h1 {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #6e6e73;
            margin-bottom: 2.5rem;
        }
        .gate input[type="password"] {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            background: #fff;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .gate input[type="password"]:focus {
            border-color: #1d1d1f;
        }
        .gate button {
            width: 100%;
            padding: 0.7rem;
            margin-top: 0.6rem;
            border: none;
            border-radius: 8px;
            background: #1d1d1f;
            color: #fafaf8;
            font-size: 0.8rem;
            font-family: inherit;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .gate button:hover { opacity: 0.82; }
        .error {
            color: #ff3b30;
            font-size: 0.78rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <form class="gate" method="post" action="/auth">
        <h1>Book Editor</h1>
        <input type="password" name="key" placeholder="Access key" autofocus required>
        <button type="submit">Continue</button>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
    </form>
</body>
</html>
