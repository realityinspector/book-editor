<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if mode == 'register' %}Register{% else %}Sign In{% endif %} — Book Editor</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background: #fafaf8;
            color: #1d1d1f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .gate {
            text-align: center;
            width: 100%;
            max-width: 320px;
            padding: 0 1.5rem;
        }
        .gate h1 {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #6e6e73;
            margin-bottom: 2rem;
        }
        .gate input[type="text"],
        .gate input[type="password"] {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            background: #fff;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 0.5rem;
        }
        .gate input:focus { border-color: #1d1d1f; }
        .gate button {
            width: 100%;
            padding: 0.7rem;
            margin-top: 0.3rem;
            border: none;
            border-radius: 8px;
            background: #1d1d1f;
            color: #fafaf8;
            font-size: 0.8rem;
            font-family: inherit;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .gate button:hover { opacity: 0.82; }
        .error {
            color: #ff3b30;
            font-size: 0.78rem;
            margin-top: 0.8rem;
        }
        .switch {
            margin-top: 1.5rem;
            font-size: 0.78rem;
            color: #86868b;
        }
        .switch a {
            color: #007aff;
            text-decoration: none;
        }
        .switch a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    {% if mode == 'register' %}
    <form class="gate" method="post" action="/register">
        <h1>Book Editor</h1>
        <input type="text" name="username" placeholder="Username" autofocus required>
        <input type="text" name="display_name" placeholder="Display name (optional)">
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Create Account</button>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <p class="switch">Already have an account? <a href="/">Sign in</a></p>
    </form>
    {% else %}
    <form class="gate" method="post" action="/auth">
        <h1>Book Editor</h1>
        <input type="text" name="username" placeholder="Username" autofocus required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <p class="switch">Need an account? <a href="/register">Register</a></p>
    </form>
    {% endif %}
</body>
</html>
